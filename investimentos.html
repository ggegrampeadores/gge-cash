<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Investimentos Previstos - GGE CASH</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
           background:#0d1117; color:#e6edf3; }
    .main-with-sidebar { margin-left:48px; min-height:100vh; padding:24px 32px; }
    h1 { font-size:22px; font-weight:600; margin-bottom:6px; }
    .subtitle { color:#8b949e; font-size:13px; margin-bottom:24px; }
    .card { background:#161b22; border:1px solid #30363d; border-radius:8px;
            padding:20px; margin-bottom:20px; }
    .card h2 { font-size:14px; font-weight:600; margin-bottom:14px; color:#c9d1d9;
               text-transform:uppercase; letter-spacing:.5px; }
    .form-grid { display:grid; grid-template-columns:repeat(4, 1fr); gap:12px; }
    .form-grid .full { grid-column:1 / -1; }
    .form-grid label { display:block; font-size:11px; color:#8b949e;
                       margin-bottom:4px; text-transform:uppercase; letter-spacing:.4px; }
    .form-grid input, .form-grid select, .form-grid textarea {
      width:100%; padding:8px 10px; background:#0d1117; border:1px solid #30363d;
      color:#e6edf3; border-radius:5px; font-size:13px; font-family:inherit;
    }
    .form-grid input:focus, .form-grid select:focus, .form-grid textarea:focus { outline:none; border-color:#58a6ff; }
    .form-grid textarea { resize:vertical; min-height:60px; }
    .actions { display:flex; gap:10px; margin-top:14px; }
    button { padding:8px 16px; border:none; border-radius:5px; cursor:pointer;
             font-size:13px; font-weight:500; }
    .btn-primary { background:#238636; color:#fff; }
    .btn-primary:hover { background:#2ea043; }
    .btn-secondary { background:#30363d; color:#e6edf3; }
    .btn-secondary:hover { background:#3f444d; }
    .btn-danger { background:#da3633; color:#fff; }
    .btn-danger:hover { background:#f85149; }
    table { width:100%; border-collapse:collapse; }
    th, td { padding:10px 12px; text-align:left; border-bottom:1px solid #30363d; font-size:13px; }
    th { color:#8b949e; font-size:11px; text-transform:uppercase; letter-spacing:.4px; font-weight:600; }
    tr:hover td { background:#1f2630; }
    .valor-cell { font-family:'SF Mono',Menlo,monospace; color:#f85149; text-align:right; }
    .msg { padding:10px 14px; border-radius:5px; margin-bottom:14px; font-size:13px; display:none; }
    .msg.show { display:block; }
    .msg.success { background:#0d3920; color:#3fb950; border:1px solid #1f5333; }
    .msg.error { background:#3a1e1f; color:#f85149; border:1px solid #6e2426; }
    .row-actions { display:flex; gap:6px; }
    .row-actions button { padding:4px 10px; font-size:12px; }
    .pill { display:inline-block; padding:2px 8px; border-radius:10px;
            font-size:11px; font-weight:600; background:#1c2733; color:#58a6ff; }
    .pill-rec { background:#2b1f3a; color:#a371f7; }
  </style>
</head>
<body>
  <div id="sidebar-container"></div>
  <div class="main-with-sidebar">
    <h1>Investimentos Previstos</h1>
    <p class="subtitle">Aportes, compras e investimentos planejados. Entram como saidas extras no forecast nas datas previstas.</p>

    <div id="msg" class="msg"></div>

    <div class="card">
      <h2 id="form-title">+ Novo investimento previsto</h2>
      <div class="form-grid">
        <div>
          <label>Descricao</label>
          <input id="f_desc" placeholder="ex: compra de maquina X">
        </div>
        <div>
          <label>Valor (R$)</label>
          <input id="f_valor" type="number" step="0.01" min="0">
        </div>
        <div>
          <label>Data prevista</label>
          <input id="f_data" type="date">
        </div>
        <div>
          <label>Recorrente?</label>
          <select id="f_recorrente">
            <option value="false">Nao</option>
            <option value="true">Sim</option>
          </select>
        </div>
        <div>
          <label>Recorrencia (meses)</label>
          <input id="f_rec_meses" type="number" min="1" placeholder="apenas se recorrente">
        </div>
        <div class="full">
          <label>Observacao</label>
          <textarea id="f_obs"></textarea>
        </div>
      </div>
      <div class="actions">
        <button class="btn-primary" id="btn-salvar">Salvar</button>
        <button class="btn-secondary" id="btn-cancelar" style="display:none;">Cancelar edicao</button>
      </div>
    </div>

    <div class="card">
      <h2>Previstos cadastrados</h2>
      <table>
        <thead>
          <tr>
            <th>Descricao</th>
            <th style="width:130px;">Data prevista</th>
            <th style="width:140px;">Tipo</th>
            <th style="width:160px; text-align:right;">Valor</th>
            <th>Observacao</th>
            <th style="width:140px;">Acoes</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

  <script src="sidebar.js" defer></script>
  <script>
    var sb = supabase.createClient(window.GGE_SUPABASE_URL, window.GGE_SUPABASE_KEY);
    var editandoId = null;

    function showMsg(texto, tipo) {
      var el = document.getElementById('msg');
      el.className = 'msg show ' + tipo;
      el.textContent = texto;
      setTimeout(function() { el.className = 'msg'; }, 3500);
    }

    function hojeISO() {
      var d = new Date();
      return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
    }

    async function carregar() {
      var r = await sb.from('cash_investimentos_previstos').select('*').eq('ativo', true).order('data_prevista');
      if (r.error) { showMsg('Erro: ' + r.error.message, 'error'); return; }
      var html = '';
      (r.data || []).forEach(function(i) {
        var tipoPill = i.recorrente
          ? '<span class="pill pill-rec">A cada ' + (i.recorrencia_meses || '?') + ' mes(es)</span>'
          : '<span class="pill">Unico</span>';
        html += '<tr>'
             +  '<td><strong>' + (i.descricao || '') + '</strong></td>'
             +  '<td>' + fmtDateBR(i.data_prevista) + '</td>'
             +  '<td>' + tipoPill + '</td>'
             +  '<td class="valor-cell">' + fmtBRL(i.valor) + '</td>'
             +  '<td style="color:#8b949e;">' + (i.observacao || '') + '</td>'
             +  '<td><div class="row-actions">'
             +     '<button class="btn-secondary" onclick="editar(\'' + i.id + '\')">Editar</button>'
             +     '<button class="btn-danger" onclick="remover(\'' + i.id + '\')">Remover</button>'
             +     '</div></td>'
             +  '</tr>';
      });
      if (!html) html = '<tr><td colspan="6" style="text-align:center; color:#8b949e; padding:30px;">Nenhum investimento previsto.</td></tr>';
      document.getElementById('tbody').innerHTML = html;
    }

    function limparForm() {
      editandoId = null;
      document.getElementById('form-title').textContent = '+ Novo investimento previsto';
      document.getElementById('btn-cancelar').style.display = 'none';
      document.getElementById('f_desc').value = '';
      document.getElementById('f_valor').value = '';
      document.getElementById('f_data').value = hojeISO();
      document.getElementById('f_recorrente').value = 'false';
      document.getElementById('f_rec_meses').value = '';
      document.getElementById('f_obs').value = '';
    }

    window.editar = async function(id) {
      var r = await sb.from('cash_investimentos_previstos').select('*').eq('id', id).single();
      if (r.error) { showMsg('Erro: ' + r.error.message, 'error'); return; }
      var i = r.data;
      editandoId = id;
      document.getElementById('form-title').textContent = 'Editando: ' + i.descricao;
      document.getElementById('btn-cancelar').style.display = 'inline-block';
      document.getElementById('f_desc').value = i.descricao || '';
      document.getElementById('f_valor').value = i.valor;
      document.getElementById('f_data').value = i.data_prevista;
      document.getElementById('f_recorrente').value = i.recorrente ? 'true' : 'false';
      document.getElementById('f_rec_meses').value = i.recorrencia_meses || '';
      document.getElementById('f_obs').value = i.observacao || '';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    window.remover = async function(id) {
      if (!confirm('Remover este investimento previsto?')) return;
      var r = await sb.from('cash_investimentos_previstos').update({ ativo: false }).eq('id', id);
      if (r.error) { showMsg('Erro: ' + r.error.message, 'error'); return; }
      showMsg('Investimento removido.', 'success');
      carregar();
    };

    document.getElementById('btn-salvar').onclick = async function() {
      var desc = document.getElementById('f_desc').value.trim();
      var valor = document.getElementById('f_valor').value;
      var data = document.getElementById('f_data').value;
      if (!desc) { showMsg('Descricao e obrigatoria.', 'error'); return; }
      if (!valor || parseFloat(valor) <= 0) { showMsg('Valor e obrigatorio.', 'error'); return; }
      if (!data) { showMsg('Data e obrigatoria.', 'error'); return; }
      var payload = {
        descricao: desc,
        valor: parseFloat(valor),
        data_prevista: data,
        recorrente: document.getElementById('f_recorrente').value === 'true',
        recorrencia_meses: parseInt(document.getElementById('f_rec_meses').value) || null,
        observacao: document.getElementById('f_obs').value.trim() || null,
        ativo: true
      };
      var r;
      if (editandoId) r = await sb.from('cash_investimentos_previstos').update(payload).eq('id', editandoId);
      else            r = await sb.from('cash_investimentos_previstos').insert(payload);
      if (r.error) { showMsg('Erro: ' + r.error.message, 'error'); return; }
      showMsg(editandoId ? 'Investimento atualizado.' : 'Investimento criado.', 'success');
      limparForm();
      carregar();
    };

    document.getElementById('btn-cancelar').onclick = limparForm;

    document.getElementById('f_data').value = hojeISO();
    carregar();
  </script>
</body>
</html>
