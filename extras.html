<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Extras - GGE CASH</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
           background:#0d1117; color:#e6edf3; }
    .main-with-sidebar { margin-left:48px; min-height:100vh; padding:24px 32px; }
    h1 { font-size:22px; font-weight:600; margin-bottom:6px; }
    .subtitle { color:#8b949e; font-size:13px; margin-bottom:24px; }
    .card { background:#161b22; border:1px solid #30363d; border-radius:8px;
            padding:20px; margin-bottom:20px; }
    .card h2 { font-size:14px; font-weight:600; margin-bottom:14px; color:#c9d1d9;
               text-transform:uppercase; letter-spacing:.5px; }
    .form-grid { display:grid; grid-template-columns:repeat(4, 1fr); gap:12px; }
    .form-grid .full { grid-column:1 / -1; }
    .form-grid label { display:block; font-size:11px; color:#8b949e;
                       margin-bottom:4px; text-transform:uppercase; letter-spacing:.4px; }
    .form-grid input, .form-grid select, .form-grid textarea {
      width:100%; padding:8px 10px; background:#0d1117; border:1px solid #30363d;
      color:#e6edf3; border-radius:5px; font-size:13px; font-family:inherit;
    }
    .form-grid input:focus, .form-grid select:focus, .form-grid textarea:focus { outline:none; border-color:#58a6ff; }
    .form-grid textarea { resize:vertical; min-height:60px; }
    .actions { display:flex; gap:10px; margin-top:14px; }
    button { padding:8px 16px; border:none; border-radius:5px; cursor:pointer;
             font-size:13px; font-weight:500; }
    .btn-primary { background:#238636; color:#fff; }
    .btn-primary:hover { background:#2ea043; }
    .btn-secondary { background:#30363d; color:#e6edf3; }
    .btn-secondary:hover { background:#3f444d; }
    .btn-danger { background:#da3633; color:#fff; }
    .btn-danger:hover { background:#f85149; }
    table { width:100%; border-collapse:collapse; }
    th, td { padding:10px 12px; text-align:left; border-bottom:1px solid #30363d; font-size:13px; }
    th { color:#8b949e; font-size:11px; text-transform:uppercase; letter-spacing:.4px; font-weight:600; }
    tr:hover td { background:#1f2630; }
    .pill { display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:600; }
    .pill-entrada { background:#0d3920; color:#3fb950; }
    .pill-saida { background:#3a1e1f; color:#f85149; }
    .valor-cell { font-family:'SF Mono',Menlo,monospace; }
    .valor-cell.entrada { color:#3fb950; }
    .valor-cell.saida { color:#f85149; }
    .msg { padding:10px 14px; border-radius:5px; margin-bottom:14px; font-size:13px; display:none; }
    .msg.show { display:block; }
    .msg.success { background:#0d3920; color:#3fb950; border:1px solid #1f5333; }
    .msg.error { background:#3a1e1f; color:#f85149; border:1px solid #6e2426; }
    .row-actions { display:flex; gap:6px; }
    .row-actions button { padding:4px 10px; font-size:12px; }
    .summary { display:flex; gap:24px; margin-bottom:18px; }
    .summary-item { background:#161b22; border:1px solid #30363d; border-radius:8px;
                    padding:14px 18px; flex:1; }
    .summary-item .label { color:#8b949e; font-size:11px; text-transform:uppercase; letter-spacing:.4px; }
    .summary-item .valor { font-size:22px; font-weight:700; margin-top:4px; font-family:'SF Mono',Menlo,monospace; }
    .summary-item.entrada .valor { color:#3fb950; }
    .summary-item.saida .valor { color:#f85149; }
    .summary-item.liquido .valor { color:#58a6ff; }
  </style>
</head>
<body>
  <div id="sidebar-container"></div>
  <div class="main-with-sidebar">
    <h1>Lancamentos Extras</h1>
    <p class="subtitle">Entradas e saidas avulsas que nao vem do Bling: aportes de emprestimo, despesas imprevistas, recebimentos pontuais.</p>

    <div id="msg" class="msg"></div>

    <div class="summary">
      <div class="summary-item entrada">
        <div class="label">Entradas (proximos 60 dias)</div>
        <div class="valor" id="sum-entradas">R$ 0,00</div>
      </div>
      <div class="summary-item saida">
        <div class="label">Saidas (proximos 60 dias)</div>
        <div class="valor" id="sum-saidas">R$ 0,00</div>
      </div>
      <div class="summary-item liquido">
        <div class="label">Liquido</div>
        <div class="valor" id="sum-liquido">R$ 0,00</div>
      </div>
    </div>

    <div class="card">
      <h2 id="form-title">+ Novo lancamento extra</h2>
      <div class="form-grid">
        <div>
          <label>Data</label>
          <input id="f_data" type="date">
        </div>
        <div>
          <label>Tipo</label>
          <select id="f_tipo">
            <option value="entrada">Entrada</option>
            <option value="saida">Saida</option>
          </select>
        </div>
        <div>
          <label>Categoria</label>
          <select id="f_categoria">
            <option value="aporte_emprestimo">Aporte de emprestimo</option>
            <option value="despesa_imprevista">Despesa imprevista</option>
            <option value="recebimento_pontual">Recebimento pontual</option>
            <option value="outros">Outros</option>
          </select>
        </div>
        <div>
          <label>Valor (R$)</label>
          <input id="f_valor" type="number" step="0.01" min="0">
        </div>
        <div>
          <label>Alavanca vinculada (opcional)</label>
          <select id="f_alavanca">
            <option value="">— nenhuma —</option>
          </select>
        </div>
        <div class="full">
          <label>Descricao</label>
          <textarea id="f_desc" placeholder="ex: emprestimo Bradesco capital giro liberado"></textarea>
        </div>
      </div>
      <div class="actions">
        <button class="btn-primary" id="btn-salvar">Salvar</button>
        <button class="btn-secondary" id="btn-cancelar" style="display:none;">Cancelar edicao</button>
      </div>
    </div>

    <div class="card">
      <h2>Lancamentos</h2>
      <table>
        <thead>
          <tr>
            <th style="width:110px;">Data</th>
            <th style="width:90px;">Tipo</th>
            <th>Categoria</th>
            <th>Descricao</th>
            <th style="width:160px; text-align:right;">Valor</th>
