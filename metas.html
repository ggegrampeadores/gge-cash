<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Metas de Vendas - GGE CASH</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
           background:#0d1117; color:#e6edf3; }
    .main-with-sidebar { margin-left:48px; min-height:100vh; padding:24px 32px; }
    h1 { font-size:22px; font-weight:600; margin-bottom:6px; }
    .subtitle { color:#8b949e; font-size:13px; margin-bottom:24px; }
    .card { background:#161b22; border:1px solid #30363d; border-radius:8px;
            padding:20px; margin-bottom:20px; }
    .card h2 { font-size:14px; font-weight:600; margin-bottom:14px; color:#c9d1d9;
               text-transform:uppercase; letter-spacing:.5px; }
    .nav { display:flex; align-items:center; gap:14px; margin-bottom:18px; }
    .nav button { background:#30363d; color:#e6edf3; border:none; padding:6px 14px;
                  border-radius:5px; cursor:pointer; font-size:13px; }
    .nav button:hover { background:#3f444d; }
    .nav .label { color:#8b949e; font-size:12px; }
    .grid-wrap { overflow-x:auto; }
    table { border-collapse:collapse; width:100%; }
    th, td { padding:6px 8px; border-bottom:1px solid #30363d; font-size:12px; }
    th { color:#8b949e; font-size:10px; text-transform:uppercase; letter-spacing:.4px;
         font-weight:600; background:#161b22; position:sticky; top:0; }
    .canal-cell { text-align:left; padding:8px 12px; font-weight:500;
                  background:#161b22; position:sticky; left:0; white-space:nowrap; min-width:170px; }
    .week-header { text-align:center; min-width:110px; }
    .week-header .num { color:#58a6ff; font-weight:700; font-size:13px; }
    .week-header .periodo { color:#8b949e; font-size:10px; margin-top:2px; }
    .total-col { background:#0d1117; }
    .meta-cell { padding:3px; text-align:center; }
    .meta-cell input { width:100px; padding:5px 6px; background:#0d1117;
                       border:1px solid #30363d; color:#e6edf3; border-radius:4px;
                       font-size:12px; text-align:right; font-family:'SF Mono',Menlo,monospace; }
    .meta-cell input:focus { outline:none; border-color:#58a6ff; background:#0a1a2a; }
    .meta-cell input.saved { border-color:#3fb950; }
    .meta-cell input.saving { border-color:#d29922; }
    .meta-cell input.erro { border-color:#f85149; }
    .total-cell { text-align:right; padding:8px 12px; color:#58a6ff; font-weight:700;
                  font-family:'SF Mono',Menlo,monospace; font-size:13px; }
    .total-row td { background:#1f2630; font-weight:600; border-top:2px solid #30363d; }
    .canal-grupo { color:#d29922; font-weight:700; text-transform:uppercase;
                   font-size:10px; letter-spacing:.5px; padding:14px 12px 4px; }
    .msg { padding:10px 14px; border-radius:5px; margin-bottom:14px;
           font-size:13px; display:none; }
    .msg.show { display:block; }
    .msg.success { background:#0d3920; color:#3fb950; border:1px solid #1f5333; }
    .msg.error { background:#3a1e1f; color:#f85149; border:1px solid #6e2426; }
    .legenda { color:#8b949e; font-size:11px; margin-top:10px; }
  </style>
</head>
<body>
  <div id="sidebar-container"></div>
  <div class="main-with-sidebar">
    <h1>Metas de Vendas (8 semanas)</h1>
    <p class="subtitle">Previsao por canal e semana. Auto-salva ao sair do campo. Conforme o tempo passa, voce pode substituir pela venda realizada.</p>

    <div id="msg" class="msg"></div>

    <div class="card">
      <div class="nav">
        <button id="btn-prev">‹ semana anterior</button>
        <span class="label" id="periodo-label">—</span>
        <button id="btn-next">proxima semana ›</button>
        <button id="btn-hoje" style="margin-left:auto;">Voltar para hoje</button>
      </div>

      <div class="grid-wrap">
        <table id="grid">
          <thead id="grid-head"></thead>
          <tbody id="grid-body"></tbody>
        </table>
      </div>

      <div class="legenda">
        Verde = salvo. Amarelo = salvando. Vermelho = erro. Total na coluna direita e na linha inferior em tempo real.
      </div>
    </div>
  </div>

  <script src="sidebar.js" defer></script>
  <script>
    var sb = supabase.createClient(window.GGE_SUPABASE_URL, window.GGE_SUPABASE_KEY);

    var CANAIS = [
      { id: 'b2b_francisco', label: 'Francisco', grupo: 'B2B - Venda Direta' },
      { id: 'b2b_lorena',    label: 'Lorena',    grupo: 'B2B - Venda Direta' },
      { id: 'b2b_matheus',   label: 'Matheus',   grupo: 'B2B - Venda Direta' },
      { id: 'ml_gge_rj',     label: 'ML GGE-RJ', grupo: 'Mercado Livre' },
      { id: 'ml_gge_sp',     label: 'ML GGE-SP', grupo: 'Mercado Livre' },
      { id: 'ml_toow',       label: 'ML Toow',   grupo: 'Mercado Livre' },
      { id: 'shopee_gge_rj', label: 'Shopee GGE-RJ', grupo: 'Shopee' },
      { id: 'shopee_gge_sp', label: 'Shopee GGE-SP', grupo: 'Shopee' }
    ];

    var semanaInicialIdx = 0;
    var metas = {};
    var saveTimers = {};

    function showMsg(texto, tipo) {
      var el = document.getElementById('msg');
      el.className = 'msg show ' + tipo;
      el.textContent = texto;
      setTimeout(function() { el.className = 'msg'; }, 3500);
    }

    function obterSemanas() {
      var hoje = new Date();
      var inicio = new Date(hoje.getFullYear(), hoje.getMonth(), hoje.getDate());
      var dow = inicio.getDay() || 7;
      inicio.setDate(inicio.getDate() - dow + 1);
      inicio.setDate(inicio.getDate() + semanaInicialIdx * 7);

      var semanas = [];
      for (var i = 0; i < 8; i++) {
        var d = new Date(inicio);
        d.setDate(d.getDate() + i * 7);
        var info = semanaIso(d);
        var fim = new Date(d);
        fim.setDate(d.getDate() + 6);
        semanas.push({
          ano: info.ano,
          semana: info.semana,
          inicio: d,
          fim: fim,
          rotuloCurto: 'S' + info.semana,
          rotuloPeriodo: ('0' + d.getDate()).slice(-2) + '/' + ('0' + (d.getMonth() + 1)).slice(-2) + ' - ' + ('0' + fim.getDate()).slice(-2) + '/' + ('0' + (fim.getMonth() + 1)).slice(-2)
        });
      }
      return semanas;
    }

    async function carregarMetas(semanas) {
      var anos = Array.from(new Set(semanas.map(function(s){return s.ano;})));
      var semNums = Array.from(new Set(semanas.map(function(s){return s.semana;})));
      var r = await sb.from('cash_metas_vendas').select('*')
                      .in('ano', anos).in('semana', semNums);
      if (r.error) { showMsg('Erro ao carregar: ' + r.error.message, 'error'); return; }
      metas = {};
      (r.data || []).forEach(function(m) {
        metas[m.ano + '-' + m.semana + '-' + m.canal] = m;
      });
    }

    function renderGrid(semanas) {
      var head = '<tr><th class="canal-cell">Canal</th>';
      semanas.forEach(function(s) {
        head += '<th class="week-header"><div class="num">' + s.rotuloCurto + ' / ' + s.ano + '</div><div class="periodo">' + s.rotuloPeriodo + '</div></th>';
      });
      head += '<th class="week-header total-col">Total</th></tr>';
      document.getElementById('grid-head').innerHTML = head;

      var body = '';
      var grupoAtual = null;
      CANAIS.forEach(function(c) {
        if (c.grupo !== grupoAtual) {
          body += '<tr><td class="canal-grupo" colspan="' + (semanas.length + 2) + '">' + c.grupo + '</td></tr>';
          grupoAtual = c.grupo;
        }
        body += '<tr><td class="canal-cell">' + c.label + '</td>';
        var totalLinha = 0;
        semanas.forEach(function(s) {
          var chave = s.ano + '-' + s.semana + '-' + c.id;
          var m = metas[chave];
          var valor = m ? Number(m.valor_meta || 0) : 0;
          totalLinha += valor;
          body += '<td class="meta-cell">'
               +  '<input type="number" step="0.01" min="0" value="' + (valor || '') + '"'
               +  ' data-ano="' + s.ano + '" data-semana="' + s.semana + '" data-canal="' + c.id + '"'
               +  ' onchange="salvar(this)" onblur="salvar(this)">'
               +  '</td>';
        });
        body += '<td class="total-cell" data-canal-total="' + c.id + '">' + fmtBRL(totalLinha) + '</td></tr>';
      });

      body += '<tr class="total-row"><td class="canal-cell">TOTAL SEMANA</td>';
      semanas.forEach(function(s) {
        body += '<td class="total-cell" data-semana-total="' + s.ano + '-' + s.semana + '" style="text-align:right;">' + fmtBRL(0) + '</td>';
      });
      body += '<td class="total-cell" id="grand-total">' + fmtBRL(0) + '</td></tr>';

      document.getElementById('grid-body').innerHTML = body;
      recalcularTotais();
    }

    function recalcularTotais() {
      var semanas = obterSemanas();
      var grand = 0;

      semanas.forEach(function(s) {
        var total = 0;
        CANAIS.forEach(function(c) {
          var chave = s.ano + '-' + s.semana + '-' + c.id;
          var m = metas[chave];
          if (m) total += Number(m.valor_meta || 0);
        });
        var cell = document.querySelector('[data-semana-total="' + s.ano + '-' + s.semana + '"]');
        if (cell) cell.textContent = fmtBRL(total);
        grand += total;
      });

      CANAIS.forEach(function(c) {
        var total = 0;
        semanas.forEach(function(s) {
          var chave = s.ano + '-' + s.semana + '-' + c.id;
          var m = metas[chave];
          if (m) total += Number(m.valor_meta || 0);
        });
        var cell = document.querySelector('[data-canal-total="' + c.id + '"]');
        if (cell) cell.textContent = fmtBRL(total);
      });

      var gt = document.getElementById('grand-total');
      if (gt) gt.textContent = fmtBRL(grand);
    }

    window.salvar = function(input) {
      var ano = parseInt(input.dataset.ano);
      var semana = parseInt(input.dataset.semana);
      var canal = input.dataset.canal;
      var valor = parseFloat(input.value) || 0;
      var chave = ano + '-' + semana + '-' + canal;

      if (saveTimers[chave]) clearTimeout(saveTimers[chave]);
      input.classList.remove('saved', 'erro');
      input.classList.add('saving');

      saveTimers[chave] = setTimeout(async function() {
        var payload = {
          ano: ano, semana: semana, canal: canal,
          valor_meta: valor,
          atualizado_em: new Date().toISOString()
        };
        var r = await sb.from('cash_metas_vendas').upsert(payload, { onConflict: 'ano,semana,canal' });
        input.classList.remove('saving');
        if (r.error) {
          input.classList.add('erro');
          showMsg('Erro: ' + r.error.message, 'error');
          return;
        }
        input.classList.add('saved');
        metas[chave] = Object.assign(metas[chave] || {}, payload);
        recalcularTotais();
        setTimeout(function() { input.classList.remove('saved'); }, 1500);
      }, 350);
    };

    async function renderTudo() {
      var semanas = obterSemanas();
      document.getElementById('periodo-label').textContent =
        'Semana ' + semanas[0].rotuloCurto + ' a ' + semanas[7].rotuloCurto +
        ' (' + semanas[0].rotuloPeriodo.split(' - ')[0] + ' a ' + semanas[7].rotuloPeriodo.split(' - ')[1] + ')';
      await carregarMetas(semanas);
      renderGrid(semanas);
    }

    document.getElementById('btn-prev').onclick = function() { semanaInicialIdx--; renderTudo(); };
    document.getElementById('btn-next').onclick = function() { semanaInicialIdx++; renderTudo(); };
    document.getElementById('btn-hoje').onclick = function() { semanaInicialIdx = 0; renderTudo(); };

    renderTudo();
  </script>
</body>
</html>
